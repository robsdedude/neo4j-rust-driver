fail_fast: true
repos:
  - repo: local
    hooks:
      - id: check
        name: cargo check
        entry: cargo +stable check --all --tests --
        language: system
        types: [rust]
        pass_filenames: false
      - id: check-all-features
        name: cargo check (all features)
        entry: cargo +stable check --all --tests --all-features --
        language: system
        types: [rust]
        pass_filenames: false
      - id: check-msrv
        name: cargo check MSRV
        entry: cargo +1.88 check --all --tests --
        language: system
        types: [rust]
        pass_filenames: false
      - id: check-msrv-all-features
        name: cargo check MSRV (all features)
        entry: cargo +1.88 check --all --tests --all-features --
        language: system
        types: [rust]
        pass_filenames: false
      - id: fmt
        name: cargo fmt
        entry: cargo +nightly fmt --
        language: system
        types: [rust]
      - id: clippy driver
        name: cargo clippy (driver)
        entry: cargo clippy --tests -p neo4j -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: clippy all
        name: cargo clippy (all)
        entry: cargo clippy --all --all-features --tests -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: unit
        name: unit tests
        entry: cargo +stable test --workspace --tests --benches --features _internal_public_api
        language: system
        types: [rust]
        pass_filenames: false
      - id: dependency type exports
        name: check exported dependencies
        entry: >
          bash -ec "
          cd neo4j;
          cargo +nightly-2025-10-18 install --locked cargo-check-external-types@0.4.0
          && cargo +nightly-2025-10-18 check-external-types --all-features"
        language: system
        types_or: [rust, toml]
        pass_filenames: false
      - id: docs
        name: cargo doc
        entry: env RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
        language: system
        types: [rust]
        pass_filenames: false
